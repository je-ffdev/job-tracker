<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JBP — Job Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f5f2ee;
  --surface: #ffffff;
  --card: #fafaf8;
  --border: #e2ddd8;
  --text: #1a1714;
  --muted: #9a9088;
  --accent: #c84b2f;
  --accent2: #2f7dc8;
  --green: #2a9d5c;
  --yellow: #d4a017;
  --serif: 'Playfair Display', serif;
  --mono: 'DM Mono', monospace;
  --sans: 'Outfit', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
}

/* HEADER */
header {
  background: var(--text);
  color: var(--bg);
  padding: 1.5rem 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left h1 {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.header-left p {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: #9a9088;
  margin-top: 0.2rem;
  letter-spacing: 0.08em;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.btn-add {
  background: var(--accent);
  color: white;
  border: none;
  padding: 0.6rem 1.4rem;
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-add:hover { opacity: 0.85; }

/* STATS BAR */
.stats-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1.2rem 2.5rem;
  display: flex;
  gap: 2.5rem;
  align-items: center;
}
.stat-item {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}
.stat-num {
  font-family: var(--serif);
  font-size: 1.8rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
}
.stat-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.stat-divider {
  width: 1px;
  height: 2.5rem;
  background: var(--border);
}
.response-rate {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--muted);
}
.response-rate span {
  color: var(--green);
  font-weight: 500;
}

/* CONTROLS */
.controls {
  padding: 1.2rem 2.5rem;
  display: flex;
  gap: 0.75rem;
  align-items: center;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.filter-btn {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.4rem 1rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}
.search-input {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 0.45rem 1rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  width: 220px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--text); }
.search-input::placeholder { color: var(--muted); }

/* BOARD */
.board {
  padding: 2rem 2.5rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1rem;
}

/* CARDS */
.app-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 1.5rem;
  position: relative;
  transition: all 0.2s ease;
  animation: cardIn 0.35s ease both;
}
.app-card:hover {
  box-shadow: 4px 4px 0 var(--text);
  transform: translate(-2px, -2px);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: none; }
}

.card-status-bar {
  height: 3px;
  margin: -1.5rem -1.5rem 1.25rem;
  border-radius: 0;
}
.status-applied { background: var(--accent2); }
.status-interview { background: var(--yellow); }
.status-offer { background: var(--green); }
.status-rejected { background: #ccc; }
.status-wishlist { background: var(--muted); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
}
.card-company {
  font-family: var(--serif);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.card-actions {
  display: flex;
  gap: 0.4rem;
  opacity: 0;
  transition: opacity 0.15s;
}
.app-card:hover .card-actions { opacity: 1; }
.icon-btn {
  background: none;
  border: 1px solid var(--border);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 0.75rem;
  color: var(--muted);
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
.icon-btn.delete:hover { background: var(--accent); border-color: var(--accent); }

.card-role {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
  font-weight: 500;
}
.card-meta {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.meta-chip {
  font-family: var(--mono);
  font-size: 0.6rem;
  padding: 0.2rem 0.5rem;
  border: 1px solid var(--border);
  color: var(--muted);
  letter-spacing: 0.05em;
}
.card-notes {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.65;
  border-top: 1px solid var(--border);
  padding-top: 0.75rem;
  margin-top: 0.5rem;
  font-style: italic;
}

.status-badge {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.2rem 0.55rem;
  border-radius: 0;
  font-weight: 500;
}
.badge-applied { background: rgba(47,125,200,0.1); color: var(--accent2); border: 1px solid rgba(47,125,200,0.2); }
.badge-interview { background: rgba(212,160,23,0.1); color: var(--yellow); border: 1px solid rgba(212,160,23,0.25); }
.badge-offer { background: rgba(42,157,92,0.1); color: var(--green); border: 1px solid rgba(42,157,92,0.2); }
.badge-rejected { background: rgba(0,0,0,0.05); color: var(--muted); border: 1px solid var(--border); }
.badge-wishlist { background: rgba(154,144,136,0.1); color: var(--muted); border: 1px solid var(--border); }

/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 5rem 2rem;
  color: var(--muted);
}
.empty-state p { font-family: var(--mono); font-size: 0.75rem; margin-top: 0.5rem; }
.empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,23,20,0.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  width: 100%;
  max-width: 520px;
  padding: 2.5rem;
  transform: translateY(20px);
  transition: transform 0.2s ease;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-overlay.open .modal { transform: none; }

.modal-title {
  font-family: var(--serif);
  font-size: 1.5rem;
  margin-bottom: 1.75rem;
  color: var(--text);
}

.form-group {
  margin-bottom: 1.25rem;
}
.form-group label {
  display: block;
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.4rem;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 0.65rem 0.85rem;
  border: 1px solid var(--border);
  background: var(--bg);
  font-family: var(--sans);
  font-size: 0.85rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  border-radius: 0;
  appearance: none;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--text); }
.form-group textarea { resize: vertical; min-height: 80px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.75rem;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.btn-cancel {
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 0.6rem 1.4rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}
.btn-cancel:hover { border-color: var(--text); color: var(--text); }
.btn-save {
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 0.6rem 1.4rem;
  background: var(--text);
  color: var(--bg);
  border: none;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.8; }

/* TIMELINE strip */
.timeline-bar {
  display: flex;
  padding: 0 2.5rem 2rem;
  gap: 0;
  overflow-x: auto;
}
.tl-step {
  flex: 1;
  min-width: 80px;
  text-align: center;
}
.tl-step-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
}
.tl-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  font-family: var(--serif);
  position: relative;
  z-index: 1;
}
.tl-dot.filled { border-color: var(--text); color: var(--text); }
.tl-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  text-align: center;
}
.tl-line {
  flex: 1;
  height: 2px;
  background: var(--border);
  margin-top: 15px;
  align-self: flex-start;
}

@media (max-width: 640px) {
  header, .stats-bar, .controls, .board { padding-left: 1rem; padding-right: 1rem; }
  .form-row { grid-template-columns: 1fr; }
  .modal { padding: 1.5rem; margin: 1rem; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <h1>Job Tracker</h1>
    <p>je-ffdev · 2025 job search</p>
  </div>
  <div class="header-right">
    <button class="btn-add" onclick="openModal()">+ Add Application</button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-num" id="stat-total">0</div>
    <div class="stat-label">Total</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-num" id="stat-applied" style="color:var(--accent2)">0</div>
    <div class="stat-label">Applied</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-num" id="stat-interview" style="color:var(--yellow)">0</div>
    <div class="stat-label">Interview</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-num" id="stat-offer" style="color:var(--green)">0</div>
    <div class="stat-label">Offer</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-num" id="stat-rejected" style="color:var(--muted)">0</div>
    <div class="stat-label">Rejected</div>
  </div>
  <div class="response-rate">Response rate: <span id="response-rate">—</span></div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="wishlist">Wishlist</button>
  <button class="filter-btn" data-filter="applied">Applied</button>
  <button class="filter-btn" data-filter="interview">Interview</button>
  <button class="filter-btn" data-filter="offer">Offer</button>
  <button class="filter-btn" data-filter="rejected">Rejected</button>
  <input type="text" class="search-input" id="searchInput" placeholder="Search company or role..." oninput="renderCards()"/>
</div>

<!-- BOARD -->
<div class="board" id="board"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">New Application</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Company *</label>
        <input type="text" id="f-company" placeholder="e.g. Shell, BP, McKinsey"/>
      </div>
      <div class="form-group">
        <label>Role *</label>
        <input type="text" id="f-role" placeholder="e.g. Energy Analyst"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="wishlist">Wishlist</option>
          <option value="applied" selected>Applied</option>
          <option value="interview">Interview</option>
          <option value="offer">Offer</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date Applied</label>
        <input type="date" id="f-date"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="f-location" placeholder="e.g. London, Remote"/>
      </div>
      <div class="form-group">
        <label>Salary (est.)</label>
        <input type="text" id="f-salary" placeholder="e.g. £45,000"/>
      </div>
    </div>
    <div class="form-group">
      <label>Job URL</label>
      <input type="url" id="f-url" placeholder="https://..."/>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Interview prep, contacts, next steps..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveApplication()">Save Application</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────
const STORAGE_KEY = 'caleb_job_tracker_v1';
let apps = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let editingId = null;
let activeFilter = 'all';

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
}

// ── STATS ─────────────────────────────────────────────
function updateStats() {
  const total = apps.length;
  const counts = { applied: 0, interview: 0, offer: 0, rejected: 0, wishlist: 0 };
  apps.forEach(a => { if (counts[a.status] !== undefined) counts[a.status]++; });

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-applied').textContent = counts.applied;
  document.getElementById('stat-interview').textContent = counts.interview;
  document.getElementById('stat-offer').textContent = counts.offer;
  document.getElementById('stat-rejected').textContent = counts.rejected;

  const responded = counts.interview + counts.offer + counts.rejected;
  const sent = counts.applied + responded;
  const rate = sent > 0 ? Math.round((responded / sent) * 100) + '%' : '—';
  document.getElementById('response-rate').textContent = rate;
}

// ── RENDER ────────────────────────────────────────────
function statusBadge(s) {
  const labels = { applied: 'Applied', interview: 'Interview', offer: 'Offer 🎉', rejected: 'Rejected', wishlist: 'Wishlist' };
  return `<span class="status-badge badge-${s}">${labels[s] || s}</span>`;
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function daysAgo(d) {
  if (!d) return '';
  const diff = Math.floor((Date.now() - new Date(d + 'T00:00:00')) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return '1d ago';
  return diff + 'd ago';
}

function renderCards() {
  const board = document.getElementById('board');
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = apps.filter(a => {
    const matchFilter = activeFilter === 'all' || a.status === activeFilter;
    const matchSearch = !search ||
      a.company.toLowerCase().includes(search) ||
      a.role.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  // Sort: offers first, then interviews, applied, wishlist, rejected
  const order = { offer: 0, interview: 1, applied: 2, wishlist: 3, rejected: 4 };
  filtered.sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));

  if (filtered.length === 0) {
    board.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <h3 style="font-family:var(--serif);font-size:1.3rem;color:var(--text)">No applications yet</h3>
        <p>Click "Add Application" to start tracking your job search.</p>
      </div>`;
    return;
  }

  board.innerHTML = filtered.map(a => `
    <div class="app-card" data-id="${a.id}">
      <div class="card-status-bar status-${a.status}"></div>
      <div class="card-top">
        <div>
          <div class="card-company">${a.company}</div>
          <div class="card-role">${a.role}</div>
        </div>
        <div class="card-actions">
          ${a.url ? `<button class="icon-btn" onclick="window.open('${a.url}','_blank')" title="Open job link">↗</button>` : ''}
          <button class="icon-btn" onclick="editApp('${a.id}')" title="Edit">✎</button>
          <button class="icon-btn delete" onclick="deleteApp('${a.id}')" title="Delete">✕</button>
        </div>
      </div>
      <div class="card-meta">
        ${statusBadge(a.status)}
        ${a.date ? `<span class="meta-chip">📅 ${formatDate(a.date)} · ${daysAgo(a.date)}</span>` : ''}
        ${a.location ? `<span class="meta-chip">📍 ${a.location}</span>` : ''}
        ${a.salary ? `<span class="meta-chip">💷 ${a.salary}</span>` : ''}
      </div>
      ${a.notes ? `<div class="card-notes">${a.notes}</div>` : ''}
    </div>
  `).join('');
}

// ── MODAL ─────────────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  const modal = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');

  if (id) {
    const a = apps.find(x => x.id === id);
    title.textContent = 'Edit Application';
    document.getElementById('f-company').value = a.company || '';
    document.getElementById('f-role').value = a.role || '';
    document.getElementById('f-status').value = a.status || 'applied';
    document.getElementById('f-date').value = a.date || '';
    document.getElementById('f-location').value = a.location || '';
    document.getElementById('f-salary').value = a.salary || '';
    document.getElementById('f-url').value = a.url || '';
    document.getElementById('f-notes').value = a.notes || '';
  } else {
    title.textContent = 'New Application';
    document.getElementById('f-company').value = '';
    document.getElementById('f-role').value = '';
    document.getElementById('f-status').value = 'applied';
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-location').value = '';
    document.getElementById('f-salary').value = '';
    document.getElementById('f-url').value = '';
    document.getElementById('f-notes').value = '';
  }
  modal.classList.add('open');
  setTimeout(() => document.getElementById('f-company').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveApplication() {
  const company = document.getElementById('f-company').value.trim();
  const role = document.getElementById('f-role').value.trim();
  if (!company || !role) {
    document.getElementById('f-company').style.borderColor = company ? '' : 'var(--accent)';
    document.getElementById('f-role').style.borderColor = role ? '' : 'var(--accent)';
    return;
  }

  const data = {
    id: editingId || Date.now().toString(),
    company,
    role,
    status: document.getElementById('f-status').value,
    date: document.getElementById('f-date').value,
    location: document.getElementById('f-location').value.trim(),
    salary: document.getElementById('f-salary').value.trim(),
    url: document.getElementById('f-url').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    updatedAt: Date.now()
  };

  if (editingId) {
    const idx = apps.findIndex(a => a.id === editingId);
    apps[idx] = data;
  } else {
    apps.unshift(data);
  }

  save();
  updateStats();
  renderCards();
  closeModal();
}

function editApp(id) { openModal(id); }

function deleteApp(id) {
  if (!confirm('Remove this application?')) return;
  apps = apps.filter(a => a.id !== id);
  save();
  updateStats();
  renderCards();
}

// ── FILTERS ───────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'n' && !document.getElementById('modalOverlay').classList.contains('open') && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    openModal();
  }
});

// ── INIT ──────────────────────────────────────────────
updateStats();
renderCards();
</script>
</body>
</html>
